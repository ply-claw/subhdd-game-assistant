<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SubHDD Game Assistant</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="popup-header">
      <span class="popup-title">🎮 Game Assistant</span>
    </div>
    <div class="popup-status" id="popup-status">检查中...</div>
    <div class="popup-counts" id="popup-counts">
      <div class="popup-game-checkboxes" id="popup-game-checkboxes" style="margin-bottom:6px">
        <label class="popup-game-row" style="display:flex;align-items:center;gap:6px;font-size:11px;margin:2px 0">
          <input type="checkbox" class="ga-game-check" data-game="lightsout" checked>
          <span>💡 点灯</span>
        </label>
        <label class="popup-game-row" style="display:flex;align-items:center;gap:6px;font-size:11px;margin:2px 0">
          <input type="checkbox" class="ga-game-check" data-game="maze" checked>
          <span>🌀 迷宫</span>
        </label>
        <label class="popup-game-row" style="display:flex;align-items:center;gap:6px;font-size:11px;margin:2px 0">
          <input type="checkbox" class="ga-game-check" data-game="minesweeper" checked>
          <span>💣 扫雷</span>
        </label>
        <label class="popup-game-row" style="display:flex;align-items:center;gap:6px;font-size:11px;margin:2px 0">
          <input type="checkbox" class="ga-game-check" data-game="flowfree" checked>
          <span>🌊 连电路</span>
        </label>
        <label class="popup-game-row" style="display:flex;align-items:center;gap:6px;font-size:11px;margin:2px 0">
          <input type="checkbox" class="ga-game-check" data-game="sokoban" checked>
          <span>📦 推箱子</span>
        </label>
        <label class="popup-game-row" style="display:flex;align-items:center;gap:6px;font-size:11px;margin:2px 0">
          <input type="checkbox" class="ga-game-check" data-game="nonogram" checked>
          <span>🎨 数织</span>
        </label>
        <label class="popup-game-row" style="display:flex;align-items:center;gap:6px;font-size:11px;margin:2px 0">
          <input type="checkbox" class="ga-game-check" data-game="memory" checked>
          <span>🃏 记忆翻牌</span>
        </label>
        <label class="popup-game-row" style="display:flex;align-items:center;gap:6px;font-size:11px;margin:2px 0">
          <input type="checkbox" class="ga-game-check" data-game="sudoku" checked>
          <span>🔢 数独</span>
        </label>
        <label class="popup-game-row" style="display:flex;align-items:center;gap:6px;font-size:11px;margin:2px 0">
          <input type="checkbox" class="ga-game-check" data-game="puzzle15" checked>
          <span>🧮 华容道</span>
        </label>
        <label class="popup-game-row" style="display:flex;align-items:center;gap:6px;font-size:11px;margin:2px 0">
          <input type="checkbox" class="ga-game-check" data-game="tile" checked>
          <span>🐑 羊了个羊</span>
        </label>
        <label class="popup-game-row" style="display:flex;align-items:center;gap:6px;font-size:11px;margin:2px 0">
          <input type="checkbox" class="ga-game-check" data-game="puzzle2048" checked>
          <span>🧩 2048</span>
        </label>
        <label class="popup-game-row" style="display:flex;align-items:center;gap:6px;font-size:11px;margin:2px 0">
          <input type="checkbox" class="ga-game-check" data-game="checkin" checked>
          <span>📅 签到</span>
        </label>
      </div>
      <div id="counts-summary"></div>
    </div>
    <div class="popup-actions">
      <button class="popup-btn popup-btn-primary" id="btn-daily-run" disabled>🚀 一键全通</button>
      <button class="popup-btn popup-btn-stop" id="btn-stop-run" style="display:none">⏹ 停止</button>
      <p class="popup-hint" id="popup-hint">预计耗时 5-15 分钟</p>
    </div>
    <div class="popup-settings">
      <label class="popup-setting">
        <span>2048 搜索深度:</span>
        <input type="range" id="depth-slider" min="1" max="5" value="3" step="1">
        <span id="depth-val">3</span>
      </label>
      <label class="popup-setting">
        <span>运行模式:</span>
        <select id="run-mode">
          <option value="tabs">新标签页</option>
          <option value="inline">当前标签</option>
        </select>
      </label>
      <label class="popup-setting" style="align-items:flex-start;flex-direction:column;gap:4px">
        <span style="display:flex;align-items:center;gap:6px">
          <input type="checkbox" id="auto-run-toggle">
          <span>每日定时自动通关</span>
        </span>
        <span style="display:flex;align-items:center;gap:6px;margin-left:22px">
          <span>时间:</span>
          <input type="time" id="auto-run-time" value="01:00" style="width:80px;background:#1e293b;color:#e0e0e0;border:1px solid #334155;border-radius:4px;padding:2px 4px;font-size:11px">
        </span>
      </label>
    </div>
    <div class="popup-footer" id="popup-footer"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
